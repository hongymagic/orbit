# Git hooks for Orbit. Auto-installed via `bun install` (prepare script).
# Skip temporarily:  LEFTHOOK=0 git commit …   or   git commit --no-verify

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md,yml,yaml}"
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      # `|| true` tolerates the case where every staged file is vendored
      # (src/components/ui/** or ai-elements/**) and oxlint's own ignore
      # patterns leave nothing to lint. pre-push runs full `oxlint` as a
      # safety net for actual errors.
      run: bunx oxlint --fix {staged_files} || true
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    typecheck:
      run: bunx tsc --noEmit
    lint-all:
      run: bunx oxlint
    build:
      run: bun run build
